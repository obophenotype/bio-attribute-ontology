pattern_name: attribute_during_activity_ratio
pattern_iri: http://purl.obolibrary.org/obo/oba/patterns/attribute_during_activity_ratio.yaml

description: "Pattern for traits that capture an attribute (e.g., rate or frequency)
  of two combined entities or processes occurring during a specific activity.
  An example is the apnea-hypopnea index, which measures the combined rate of
  apnea and hypopnea events per hour of sleep."

# examples:
# apnea-hypopnea index: rate of occurrence of (apnea or hypopnea) during sleep

classes:
  quality: PATO:0000001
  process: GO:0008150
  thing: owl:Thing
  ratio: PATO:0001470

relations:
  has_numerator: RO:0020202
  has_denominator: RO:0020203
  happens_during: RO:0002092

annotationProperties:
  exact_synonym: oio:hasExactSynonym
  related_synonym: oio:hasRelatedSynonym
  broad_synonym: oio:hasBroadSynonym
  narrow_synonym: oio:hasNarrowSynonym
  xref: oio:hasDbXref
  contributor: dct:contributor

vars:
  entity1: "'thing'"
  entity2: "'thing'"
  activity: "'process'"

data_list_vars:
  exact_synonyms: xsd:string
  broad_synonyms: xsd:string
  narrow_synonyms: xsd:string
  related_synonyms: xsd:string
  xrefs: xsd:anyURI
  orcids: xsd:anyURI

name:
  text: "%s and %s ratio during %s"
  vars:
    - entity1
    - entity2
    - activity

def:
  text: "The ratio of %s and %s events when measured during %s."
  vars:
    - entity1
    - entity2
    - activity
  annotations:
    - annotationProperty: xref
      text: "AUTO:patterns/patterns/attribute_during_activity_ratio"

annotations:
  - annotationProperty: contributor
    value: orcids

exact_synonym:
  value: exact_synonyms

broad_synonym:
  value: broad_synonyms

narrow_synonym:
  value: narrow_synonyms

xref:
  value: xrefs

# SubClassOf rather than EquivalentTo: an OWL union (OR) in an equivalence axiom
# would make any sub-rate of either entity alone a subtype of this class, which
# is semantically incorrect. The subClassOf axiom correctly places this trait in
# the hierarchy without that problem.
subClassOf:
  text: "('ratio'
    and ('has_numerator' some %s)
    and ('has_denominator' some %s))
    and ('happens_during' some %s)"
  vars:
    - entity1
    - entity2
    - activity
